<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

h1{
  background:linear-gradient(45deg,gold,white);
  -webkit-background-clip:text;
  color:transparent;
  margin-top:20px;
}

.section{ padding:40px 15px; }

button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:gold;
  cursor:pointer;
}

/* ================= MUSIC ================= */

.player{
  display:flex;
  justify-content:center;
  gap:10px;
}

/* ================= SLIDESHOW ================= */

.slideshow img,.slideshow video{
  width:90%;
  max-width:450px;
  border-radius:20px;
}

/* ================= GALLERY ================= */

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  max-width:900px;
  margin:auto;
}

.gallery img{
  width:100%;
  border-radius:12px;
}

/* ================= LETTER ================= */

.letter{
  max-width:500px;
  margin:auto;
  padding:20px;
  background:rgba(255,255,255,.08);
  border-radius:15px;
}

/* ================= PUZZLE ================= */

#puzzle{
  width:300px;
  height:300px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:3px;
}

.tile{
  background-image:url("photos/puzzle.png");
  background-repeat:no-repeat;
  width:100%;
  height:100%;
  cursor:pointer;
  border-radius:6px;
}

/* ================= STAR GAME ================= */

.star{
  position:fixed;
  font-size:24px;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>For You ✨</h1>

<!-- MUSIC PLAYER -->
<div class="section player">
  <button onclick="prevSong()">⏮</button>
  <button onclick="toggleMusic()">▶ / ⏸</button>
  <button onclick="nextSong()">⏭</button>
</div>
<audio id="song"></audio>

<!-- SLIDESHOW -->
<div class="section slideshow" id="slideshow"></div>

<!-- GALLERY -->
<div class="section">
<h2>📸</h2>
<div id="gallery" class="gallery"></div>
</div>

<!-- LETTER -->
<div class="section">
<div id="letter" class="letter"></div>
</div>

<!-- PUZZLE -->
<div class="section">
<h2>Solve The Puzzle 🧩</h2>
<div id="puzzle"></div>
<button onclick="shufflePuzzle()">Shuffle</button>
</div>

<!-- STAR GAME -->
<div class="section">
Score: <span id="score">0</span>
</div>

<script>
/* ================= MUSIC ================= */

const songs=["music/song1.mp3","music/song2.mp3"];
let currentSong=0;
const audio=document.getElementById("song");

function loadSong(){ audio.src=songs[currentSong]; }
loadSong();

function toggleMusic(){ audio.paused?audio.play():audio.pause(); }
function nextSong(){ currentSong=(currentSong+1)%songs.length; loadSong(); audio.play(); }
function prevSong(){ currentSong=(currentSong-1+songs.length)%songs.length; loadSong(); audio.play(); }

/* ================= SLIDESHOW ================= */

const slideshow=document.getElementById("slideshow");

const media=[
 "photos/sana1.png",
 "photos/sana2.png",
 "videos/vid.mp4",
 "photos/sana3.png"
];

let m=0;

function showMedia(){
 slideshow.innerHTML="";
 const f=media[m];

 if(f.endsWith(".mp4")){
  const v=document.createElement("video");
  v.src=f; v.autoplay=true; v.loop=true; v.muted=true;
  slideshow.appendChild(v);
 }else{
  const img=document.createElement("img");
  img.src=f;
  slideshow.appendChild(img);
 }

 m=(m+1)%media.length;
}
showMedia();
setInterval(showMedia,3000);

/* ================= GALLERY ================= */

const gallery=document.getElementById("gallery");

[
 "photos/sana1.png",
 "photos/sana2.png",
 "photos/sana3.png",
 "photos/sana4.png",
 "photos/sana5.png",
 "photos/sana6.png"
].forEach(src=>{
 const img=document.createElement("img");
 img.src=src;
 gallery.appendChild(img);
});

/* ================= LETTER ================= */

const msg="Oyeee  Chamak  Challo";
let i=0;

setInterval(()=>{
 if(i<msg.length) letter.innerText+=msg[i++];
},25);

/* ================= STAR GAME ================= */

let score=0;

setInterval(()=>{
 const star=document.createElement("div");
 star.className="star";
 star.innerText="⭐";
 star.style.left=Math.random()*95+"%";
 star.style.top="0";

 star.onclick=()=>{
  score++;
  document.getElementById("score").innerText=score;
  star.remove();
 };

 document.body.appendChild(star);

 let y=0;
 const fall=setInterval(()=>{
  y+=5;
  star.style.top=y+"px";
  if(y>700){star.remove();clearInterval(fall);}
 },20);

},1200);

/* ================= PERFECT 3×3 PUZZLE ================= */

const puzzle=document.getElementById("puzzle");
const size=3;
const pieceSize=100;

let order=[...Array(size*size).keys()];

function renderPuzzle(){
 puzzle.innerHTML="";

 order.forEach(n=>{
  const tile=document.createElement("div");
  tile.className="tile";

  const x=(n%size)*pieceSize;
  const y=Math.floor(n/size)*pieceSize;

  tile.style.backgroundPosition=`-${x}px -${y}px`;
  tile.style.backgroundSize=`${pieceSize*size}px ${pieceSize*size}px`;

  puzzle.appendChild(tile);
 });
}

function shufflePuzzle(){
 order.sort(()=>Math.random()-0.5);
 renderPuzzle();
}

let first=null;

puzzle.addEventListener("click",e=>{
 if(!e.target.classList.contains("tile")) return;

 if(!first){
  first=e.target;
  first.style.opacity="0.5";
 }else{
  const temp=first.style.backgroundPosition;
  first.style.backgroundPosition=e.target.style.backgroundPosition;
  e.target.style.backgroundPosition=temp;

  first.style.opacity="1";
  first=null;

  checkWin();
 }
});

function checkWin(){
 const tiles=[...document.querySelectorAll(".tile")];
 let correct=true;

 tiles.forEach((t,i)=>{
  const x=(i%size)*pieceSize;
  const y=Math.floor(i/size)*pieceSize;
  if(t.style.backgroundPosition!==`-${x}px -${y}px`) correct=false;
 });

 if(correct) setTimeout(()=>alert("Puzzle solved ❤️"),150);
}

shufflePuzzle();
</script>

</body>
</html>
