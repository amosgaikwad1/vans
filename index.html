<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MeriMalkin.com ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(135deg, #ffb3c6, #c40032);
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-family: 'Pacifico', cursive;
    color: #fff;
    font-size: 2.5rem;
}

#score {
    color: #fff;
    font-size: 1.4rem;
    margin-top: 8px;
}

/* Scrapbook */
.scrapbook {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 25px;
}

.photoCard {
    width: 180px;                 /* BIGGER PHOTOS */
    background: #fff;
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 6px 20px rgba(196,0,50,0.3);
    transition: transform 0.3s ease;
}

.photoCard:hover {
    transform: scale(1.05) rotate(-1deg);
}

.photoCard img {
    width: 100%;
    height: auto;
    border-radius: 12px;
}

.tape {
    width: 45px;
    height: 16px;
    background: #ffd1dc;
    margin: -12px auto 6px;
    transform: rotate(5deg);
}

/* Floating Stickers */
.sticker {
    position: absolute;
    width: 50px;
    height: 50px;
    cursor: pointer;
    animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-100vh); opacity: 0; }
}

/* Message Popup */
#messageBox {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    padding: 15px 25px;
    border-radius: 20px;
    font-size: 1.1rem;
    color: #c40032;
    display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

/* Music */
.musicBox {
    margin-top: 20px;
}
audio {
    width: 90%;
}

/* Visualizer */
.visualizer {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 5px;
    height: 50px;
    margin-top: 5px;
}
.visualizer div {
    width: 6px;
    background: #ff4d6d;
    height: 10px;
}

/* Ending message */
.finalMessage {
    margin: 50px 20px 30px;
    font-family: 'Pacifico', cursive;
    font-size: 1.4rem;
    color: #fff;
    min-height: 120px;
    animation: glow 3s infinite;
}

@keyframes glow {
  0% { text-shadow: 0 0 5px rgba(255,255,255,0.4); }
  50% { text-shadow: 0 0 20px rgba(255,182,193,0.9); }
  100% { text-shadow: 0 0 5px rgba(255,255,255,0.4); }
}

/* MOBILE FIX */
@media (max-width: 480px) {
    .photoCard {
        width: 150px;
    }
}
</style>
</head>

<body>

<h1>Is this Third Base??? 💖</h1>
<div id="score">Score: 0</div>

<div class="musicBox">
    <audio id="bgMusic" controls autoplay loop>
        <source src="music/sufr ft Arpit Bala, toorjo dey - bargad (official lyric video).mp3" type="audio/mp3">
    </audio>
    <div class="visualizer" id="visualizer"></div>
</div>

<div class="scrapbook">
    <div class="photoCard"><div class="tape"></div><img src="photos/cute1.png"></div>
    <div class="photoCard"><div class="tape"></div><img src="photos/cute2.png"></div>
    <div class="photoCard"><div class="tape"></div><img src="photos/cute3.png"></div>
</div>

<div id="messageBox"></div>
<div class="finalMessage" id="finalMessage"></div>

<script>
// Messages
const messages = [
  "Mein sabun hu😝",
  "Cute",
  "Uhhhhh....",
  "Hmmmmmmmm",
  "Kesa hai game?"

];

// Stickers
const stickers = [
  "stickers/bananacat.gif",
  "stickers/cat-freaky.gif",
  "stickers/do-dodo.gif",
  "stickers/suscat.gif",
  "stickers/sukuna.gif",
  "stickers/pray.gif",
  "stickers/hampterlove.gif"
];

let score = 0;
const scoreEl = document.getElementById("score");

// Spawn stickers
function spawnSticker() {
    let img = document.createElement("img");
    img.src = stickers[Math.floor(Math.random() * stickers.length)];
    img.className = "sticker";
    img.style.left = Math.random() * (window.innerWidth - 60) + "px";
    img.style.top = window.innerHeight + "px";

    img.onclick = () => {
        score++;
        scoreEl.textContent = "Score: " + score;

        const box = document.getElementById("messageBox");
        box.textContent = messages[Math.floor(Math.random()*messages.length)];
        box.style.display = "block";
        setTimeout(()=>box.style.display="none",1500);

        if(score === 10){
            document.getElementById("finalMessage").innerHTML =
              "Kaam hai ki nahi, madam?";
        }
        if(score === 15){
            document.getElementById("finalMessage").innerHTML =
              "Stop";
        }
        if(score === 20){
            document.getElementById("finalMessage").innerHTML =
              "Seriously Stop";
        }
        if(score === 21){
            document.getElementById("finalMessage").innerHTML =
              "Thike khel lo, wese bhi ghost karne wale ho😔😔";
        }

        img.remove();
    };

    document.body.appendChild(img);
    setTimeout(()=>img.remove(),6000);
}

setInterval(spawnSticker, 700);

// Music visualizer
const audio = document.getElementById("bgMusic");
const visualizer = document.getElementById("visualizer");
for(let i=0;i<20;i++){
    const bar = document.createElement("div");
    visualizer.appendChild(bar);
}

audio.addEventListener("play", ()=>{
    const ctx = new AudioContext();
    const src = ctx.createMediaElementSource(audio);
    const analyser = ctx.createAnalyser();
    src.connect(analyser);
    analyser.connect(ctx.destination);
    analyser.fftSize = 64;

    const data = new Uint8Array(analyser.frequencyBinCount);
    const bars = visualizer.children;

    function animate(){
        requestAnimationFrame(animate);
        analyser.getByteFrequencyData(data);
        for(let i=0;i<bars.length;i++){
            bars[i].style.height = (data[i%data.length]/3)+"px";
        }
    }
    animate();
});

// Typed ending
const endingLines = [
  "I tried, alright.",
];

let l=0,c=0;
const fm = document.getElementById("finalMessage");

function typeEnd(){
  if(l<endingLines.length){
    if(c<endingLines[l].length){
      fm.innerHTML += endingLines[l][c++];
      setTimeout(typeEnd,50);
    } else {
      fm.innerHTML += "<br>";
      l++; c=0;
      setTimeout(typeEnd,500);
    }
  }
}
typeEnd();

// Mobile autoplay unlock
document.addEventListener("click", ()=>audio.play(), { once:true });
</script>

</body>
</html>
