<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Twin</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

h1{
  background:linear-gradient(45deg,gold,white);
  -webkit-background-clip:text;
  color:transparent;
  margin-top:20px;
}

.section{ padding:40px 15px; }

button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:gold;
  cursor:pointer;
}

/* MUSIC */
.player{
  display:flex;
  justify-content:center;
  gap:10px;
}

/* SLIDESHOW */
.slideshow img{
  width:90%;
  max-width:450px;
  border-radius:20px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  max-width:900px;
  margin:auto;
}

.gallery img{
  width:100%;
  border-radius:12px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* SCORE */
#scoreBox{
  position:fixed;
  top:10px;
  right:15px;
  font-size:18px;
  background:rgba(0,0,0,0.4);
  padding:8px 12px;
  border-radius:12px;
  z-index:9999;
}

/* STICKERS */
.sticker{
  position:fixed;
  top:0;
  width:50px;
  height:50px;
  cursor:pointer;
  animation:fall linear;
  z-index:9999;
}

@keyframes fall{
  from{ transform:translateY(0); }
  to{ transform:translateY(110vh); }
}
</style>
</head>

<body>

<h1>Happy Birthday Twin ✨</h1>

<!-- SCORE -->
<div id="scoreBox">⭐ 0</div>

<!-- MUSIC PLAYER -->
<div class="section player">
  <button onclick="prevSong()">⏮</button>
  <button onclick="toggleMusic()">▶ / ⏸</button>
  <button onclick="nextSong()">⏭</button>
</div>
<audio id="song"></audio>

<!-- SLIDESHOW -->
<div class="section slideshow" id="slideshow"></div>

<!-- GALLERY -->
<div class="section">
<div id="gallery" class="gallery"></div>
</div>

<script>

/* ================= MUSIC ================= */

const songs=[
 "music/song1.mp3",
 "music/song2.mp3"
];

let currentSong=0;
const audio=document.getElementById("song");

function loadSong(){ audio.src=songs[currentSong]; }
loadSong();

function toggleMusic(){ audio.paused?audio.play():audio.pause(); }
function nextSong(){
 currentSong=(currentSong+1)%songs.length;
 loadSong();
 audio.play();
}
function prevSong(){
 currentSong=(currentSong-1+songs.length)%songs.length;
 loadSong();
 audio.play();
}

/* ================= SLIDESHOW ================= */

const slideshow=document.getElementById("slideshow");

const images=[
 "photos/sri1.png",
 "photos/sri2.png",
 "photos/sri3.png",
 "photos/sri4.png",
 "photos/sri5.png",
 "photos/sri6.png"
];

let i=0;

function showSlide(){
 slideshow.innerHTML="";
 const img=document.createElement("img");
 img.src=images[i];
 slideshow.appendChild(img);

 i=(i+1)%images.length;
}

showSlide();
setInterval(showSlide,3000);

/* ================= GALLERY ================= */

const gallery=document.getElementById("gallery");

[
 "photos/sri1.png",
 "photos/sri2.png",
 "photos/sri3.png",
 "photos/sri4.png",
 "photos/sri5.png",
 "photos/sri6.png"
].forEach(src=>{
 const img=document.createElement("img");
 img.src=src;
 gallery.appendChild(img);
});

/* ================= STICKER GAME ================= */

let score = 0;
const scoreBox = document.getElementById("scoreBox");

// your GIF stickers
const stickers = [
  "stickers/bananacat.gif",
  "stickers/cat-freaky.gif",
  "stickers/do-dodo.gif",
  "stickers/hampter.gif",
  "stickers/lick.gif",
  "stickers/pray.gif",
  "stickers/suscat.gif",
  
  "stickers/suscat.gif",
];

// fallback emojis
const emojis = ["⭐","✨","💖","🌸"];

function spawnSticker(){

  let el;

  if(Math.random() > 0.4){
    el = document.createElement("img");
    el.src = stickers[Math.floor(Math.random()*stickers.length)];
  } else {
    el = document.createElement("div");
    el.innerText = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.fontSize = "30px";
  }

  el.className = "sticker";

  el.style.left = Math.random() * (window.innerWidth - 60) + "px";
  el.style.animationDuration = (3 + Math.random()*2) + "s";

  el.onclick = () => {
    score++;
    scoreBox.innerText = "⭐ " + score;

    // pop effect
    el.style.transform = "scale(1.5)";
    el.style.opacity = "0";

    // WIN MESSAGE
    if(score === 20){
      setTimeout(()=>{
        alert("oogaa booga");
      },200);
    }

    setTimeout(()=>el.remove(),200);
  };

  document.body.appendChild(el);
  setTimeout(()=>el.remove(),5000);
}

setInterval(spawnSticker, 900);

</script>

</body>
</html>
