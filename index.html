<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Twin</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
  text-align:center;
}

h1{
  background:linear-gradient(45deg,gold,white);
  -webkit-background-clip:text;
  color:transparent;
  margin-top:20px;
}

.section{ padding:40px 15px; }

button{
  padding:10px 20px;
  border-radius:20px;
  border:none;
  background:gold;
  cursor:pointer;
}

/* MUSIC */
.player{
  display:flex;
  justify-content:center;
  gap:10px;
}

/* SLIDESHOW */
.slideshow img{
  width:90%;
  max-width:450px;
  border-radius:20px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
  max-width:900px;
  margin:auto;
}

.gallery img{
  width:100%;
  border-radius:12px;
  transition:0.3s;
}

.gallery img:hover{
  transform:scale(1.05);
}

/* ⭐ GAME */
#scoreBox{
  position:fixed;
  top:10px;
  right:15px;
  font-size:18px;
  background:rgba(0,0,0,0.4);
  padding:8px 12px;
  border-radius:12px;
}

.star{
  position:fixed;
  font-size:26px;
  cursor:pointer;
  animation:fall linear;
}

@keyframes fall{
  from{ transform:translateY(-50px); }
  to{ transform:translateY(100vh); }
}
</style>
</head>

<body>

<h1>Happy Birthday Twin ✨</h1>

<!-- SCORE -->
<div id="scoreBox">⭐ 0</div>

<!-- MUSIC PLAYER -->
<div class="section player">
  <button onclick="prevSong()">⏮</button>
  <button onclick="toggleMusic()">▶ / ⏸</button>
  <button onclick="nextSong()">⏭</button>
</div>
<audio id="song"></audio>

<!-- SLIDESHOW -->
<div class="section slideshow" id="slideshow"></div>

<!-- GALLERY -->
<div class="section">
<div id="gallery" class="gallery"></div>
</div>

<script>

/* ================= MUSIC ================= */

const songs=[
 "music/song1.mp3",
 "music/song2.mp3"
];

let currentSong=0;
const audio=document.getElementById("song");

function loadSong(){ audio.src=songs[currentSong]; }
loadSong();

function toggleMusic(){ audio.paused?audio.play():audio.pause(); }
function nextSong(){
 currentSong=(currentSong+1)%songs.length;
 loadSong();
 audio.play();
}
function prevSong(){
 currentSong=(currentSong-1+songs.length)%songs.length;
 loadSong();
 audio.play();
}

/* ================= SLIDESHOW ================= */

const slideshow=document.getElementById("slideshow");

const images=[
 "photos/sri1.png",
 "photos/sri2.png",
 "photos/sri3.png",
 "photos/sri4.png",
 "photos/sri5.png",
 "photos/sri6.png"
];

let i=0;

function showSlide(){
 slideshow.innerHTML="";
 const img=document.createElement("img");
 img.src=images[i];
 slideshow.appendChild(img);

 i=(i+1)%images.length;
}

showSlide();
setInterval(showSlide,3000);

/* ================= GALLERY ================= */

const gallery=document.getElementById("gallery");

[
 "photos/sri1.png",
 "photos/sri2.png",
 "photos/sri3.png",
 "photos/sri4.png",
 "photos/sri5.png",
 "photos/sri6.png"
].forEach(src=>{
 const img=document.createElement("img");
 img.src=src;
 gallery.appendChild(img);
});

/* ================= CLICKING GAME ================= */

let score = 0;
const scoreBox = document.getElementById("scoreBox");

function spawnStar(){
  const star = document.createElement("div");
  star.className = "star";
  star.innerText = "⭐";

  star.style.left = Math.random()*90 + "vw";
  star.style.animationDuration = (3 + Math.random()*2) + "s";

  star.onclick = () => {
    score++;
    scoreBox.innerText = "⭐ " + score;

    // cute pop effect
    star.style.transform = "scale(1.5)";
    star.style.opacity = "0";

    setTimeout(()=>star.remove(),200);
  };

  document.body.appendChild(star);

  setTimeout(()=>star.remove(),5000);
}

// spawn stars continuously
setInterval(spawnStar, 900);

</script>

</body>
</html>
